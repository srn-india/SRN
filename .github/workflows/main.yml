name: SRN Backend CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: srn_db_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d srn_db_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: artifacts/srn-backend

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: artifacts/srn-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/srn_db_test

      - name: Build Backend
        run: npm run build

      - name: Run Tests
        run: npm test -- --runInBand
        env:
          DATABASE_URL: postgresql://user:password@127.0.0.1:5432/srn_db_test
          REDIS_URL: redis://127.0.0.1:6379
          JWT_SECRET: test_secret
          JWT_REFRESH_SECRET: test_refresh_secret
          FRONTEND_URL: http://127.0.0.1:5173
          NODE_ENV: test
          SUPABASE_URL: https://dummy.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: dummy_key
          RAZORPAY_KEY_ID: rzp_test_dummy
          RAZORPAY_KEY_SECRET: dummy_secret

  frontend-test:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: artifacts/srn-website

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Build Frontend
        run: pnpm build

      - name: Run Tests
        run: pnpm test


  build-docker:
    runs-on: ubuntu-latest
    needs: [test, frontend-test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test Docker Build Locally
        run: |
          docker build -t srn-backend-test ./artifacts/srn-backend
          docker run --rm srn-backend-test node -e "console.log('Docker image verification complete!')"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./artifacts/srn-backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/srn-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/srn-backend:${{ github.sha }}
